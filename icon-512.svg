<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1030"/>
      <stop offset="100%" style="stop-color:#0a0f1e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Glow background -->
  <ellipse cx="256" cy="230" rx="120" ry="140" fill="#7c3aed" opacity="0.1" filter="url(#blur)"/>
  <!-- Mirror frame -->
  <ellipse cx="256" cy="230" rx="110" ry="130" fill="none" stroke="url(#glow)" stroke-width="8" opacity="0.8"/>
  <!-- Face silhouette (light side) -->
  <path d="M 220 185 Q 230 160 256 155 Q 256 160 256 310 Q 230 305 220 285 Q 206 260 206 230 Q 206 200 220 185" fill="#a78bfa" opacity="0.6"/>
  <!-- Shadow silhouette (dark side) -->
  <path d="M 292 185 Q 282 160 256 155 Q 256 160 256 310 Q 282 305 292 285 Q 306 260 306 230 Q 306 200 292 185" fill="#4c1d95" opacity="0.8"/>
  <!-- Eyes -->
  <circle cx="236" cy="215" r="6" fill="#c4b5fd"/>
  <circle cx="276" cy="215" r="6" fill="#7c3aed"/>
  <!-- Text -->
  <text x="256" y="420" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="44" fill="#a78bfa">SHADOW WORK</text>
  <text x="256" y="460" text-anchor="middle" font-family="sans-serif" font-weight="400" font-size="28" fill="#8b5cf6">QUIZ</text>
</svg>
